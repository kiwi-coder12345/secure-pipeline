name: Secure CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JFROG_URL: ${{ secrets.JFROG_URL }}
  JFROG_USERNAME: ${{ secrets.JFROG_USERNAME }}
  JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
  IMAGE_NAME: ${{ secrets.JFROG_URL }}/docker-local/petclinic

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Spring Pet Clinic source code
      - name: Checkout Spring Pet Clinic
        uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          ref: main

      # 2. Copy our settings.xml and Dockerfile into the checked out repo
      - name: Checkout pipeline files
        uses: actions/checkout@v4
        with:
          path: pipeline-files

      - name: Copy settings.xml and Dockerfile
        run: |
          cp pipeline-files/settings.xml .
          cp pipeline-files/Dockerfile .

      # 3. Set up Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. Compile the code via JFrog Artifactory
      - name: Compile
        run: mvn compile --settings settings.xml

      # 5. Run tests
      - name: Run Tests
        run: mvn test --settings settings.xml

      # 6. Package as JAR
      - name: Package
        run: mvn package -DskipTests --settings settings.xml

      # 7. Log in to JFrog Docker registry
      - name: Log in to JFrog Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JFROG_URL }}
          username: ${{ secrets.JFROG_USERNAME }}
          password: ${{ secrets.JFROG_TOKEN }}

      # 8. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      # 9. Push Docker image to JFrog Artifactory
      - name: Push Docker image to JFrog
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
